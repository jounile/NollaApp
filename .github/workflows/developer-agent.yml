name: Developer Agent

on:
  issues:
    types: [labeled, opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number

jobs:
  developer-agent:
    name: Implement Issue
    runs-on: self-hosted
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'Go')) ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Flutter to PATH
        shell: cmd
        run: |
          @echo off
          rem Fast path: flutter.bat already on the Windows system PATH
          for /f "tokens=*" %%i in ('where flutter.bat 2^>nul') do if not defined FLUTTER_EXE set "FLUTTER_EXE=%%i"
          if defined FLUTTER_EXE (
            for %%i in ("%FLUTTER_EXE%") do echo %%~dpi>>"%GITHUB_PATH%"
            echo Added Flutter to PATH from Windows PATH
            goto :done
          )
          rem Flutter not on Windows PATH - locate it through a Git Bash login shell.
          rem The -l flag sources ~/.bash_profile (which sources ~/.bashrc) where the
          rem Flutter SDK installer writes its PATH export.
          for /f "tokens=*" %%i in ('where bash.exe 2^>nul') do if not defined BASH set "BASH=%%i"
          if not defined BASH if exist "C:\Program Files\Git\bin\bash.exe" set "BASH=C:\Program Files\Git\bin\bash.exe"
          if not defined BASH if exist "C:\Program Files (x86)\Git\bin\bash.exe" set "BASH=C:\Program Files (x86)\Git\bin\bash.exe"
          if not defined BASH (echo ERROR: bash.exe not found & exit /b 1)
          for /f "tokens=*" %%i in ('"%BASH%" -l -c "cygpath -w $(dirname $(which flutter)) 2>/dev/null"') do if not defined FLUTTER_WIN set "FLUTTER_WIN=%%i"
          if not defined FLUTTER_WIN (echo ERROR: flutter not found via Git Bash login shell & exit /b 1)
          echo %FLUTTER_WIN%>>"%GITHUB_PATH%"
          echo Added Flutter to PATH via Git Bash: %FLUTTER_WIN%
          :done

      - name: Get dependencies
        shell: cmd
        run: flutter pub get

      - name: Run Claude Code developer agent
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: ""
          assignee_trigger: ""
          max_turns: 30
          direct_prompt: |
            You are the NollaApp developer agent. Your job is to implement GitHub issues for this Flutter application.

            ## Context

            This is a Flutter mobile app for the nolla.net community platform.

            Layer structure:
            - `lib/screens/` — UI screens; each owns its local state via StatefulWidget + setState
            - `lib/services/` — HTTP service classes that call the nolla.net API
            - `lib/models/` — JSON-parsing model classes
            - `lib/services/app_logger.dart` — in-app ring-buffer logger (use instead of print)

            Architecture rules:
            - No external state management — use `StatefulWidget` + `setState()` only.
            - Add new screens under `lib/screens/`, services under `lib/services/`, models under `lib/models/`.
            - Use `AppLogger` for all log output; never use `print()`.
            - Run `flutter analyze` and `flutter test` before finishing; fix any issues found.

            ## Your task

            ${{ github.event_name == 'workflow_dispatch' && format('Look up and implement issue #{0} from this repository.', github.event.inputs.issue_number) || '' }}
            ${{ github.event_name == 'issues' && format('Implement issue #{0}: {1}', github.event.issue.number, github.event.issue.title) || '' }}

            ${{ github.event.issue.body }}

            ## Steps

            1. Read the issue carefully and understand what needs to be implemented.
            2. Explore the relevant source files to understand existing patterns before writing code.
            3. Implement the requested changes following the architecture rules above.
            4. Run `flutter analyze` and fix any lint errors.
            5. Run `flutter test` and fix any test failures.
            6. Commit your changes to a new branch named `developer-agent/issue-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number || github.event.issue.number }}`.
            7. Open a pull request targeting `main` with a clear description of what was implemented.
            8. Comment on the issue linking to the PR.

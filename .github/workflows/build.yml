name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nolla-app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Enable web support
        run: flutter create --platforms=web --org com.example --project-name nolla_app .

      - name: Build web (main)
        if: github.event_name != 'pull_request'
        run: flutter build web --release --base-href /NollaApp/

      - name: Build web (PR preview)
        if: github.event_name == 'pull_request'
        run: flutter build web --release --base-href /NollaApp/pr-${{ github.event.pull_request.number }}/

      - name: Deploy to GitHub Pages (main)
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: true
          clean-exclude: |
            pr-*/

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          target-folder: pr-${{ github.event.pull_request.number }}
          clean: true

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const url = `https://${{ github.repository_owner }}.github.io/NollaApp/pr-${prNumber}/`;
            const body = `### Web Preview\n\n:globe_with_meridians: [Open preview](${url})\n\nDeployed from commit ${sha}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes('### Web Preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-pr-preview:
    name: Clean up PR preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Remove PR preview directory from gh-pages
        run: |
          PR_DIR="pr-${{ github.event.pull_request.number }}"
          git fetch origin gh-pages 2>/dev/null || { echo "gh-pages branch not found, nothing to clean up."; exit 0; }
          git checkout gh-pages
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_DIR"
            git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}"
            git push origin gh-pages
          else
            echo "No preview directory found for PR #${{ github.event.pull_request.number }}, nothing to clean up."
          fi

  build-ios:
    name: Build iOS (simulator)
    runs-on: macos-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Regenerate Xcode project
        run: |
          rm -f ios/Runner.xcodeproj/project.pbxproj
          flutter create --platforms=ios --org com.example --project-name nolla_app .

      - name: Build iOS simulator
        run: flutter build ios --simulator --debug

      - name: Archive iOS simulator build
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "Runner.app not found. Build tree:"; find build -type d | head -30
            exit 1
          fi
          echo "Archiving: $APP"
          mkdir -p output
          cp -r "$APP" output/Runner.app
          cd output && zip -r ../nolla-app-ios-simulator.zip Runner.app

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: nolla-app-ios-simulator
          path: nolla-app-ios-simulator.zip
          retention-days: 7

name: Build

on:
  push:
    branches: ['**']
  delete:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: false  # disabled to save Actions quota; re-enable: github.event.action != 'closed'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug --dart-define=BRANCH_NAME=${{ github.head_ref || github.ref_name }} --dart-define=TEST_USERNAME=${{ secrets.TEST_USERNAME }} --dart-define=TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}

      - name: Upload APK artifact
        id: upload_apk
        uses: actions/upload-artifact@v4
        with:
          name: nolla-app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Create GitHub Release with APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_number }}
          name: "NollaApp build #${{ github.run_number }}"
          body: |
            Automated debug build from commit ${{ github.sha }}

            **Download the APK below** under *Assets*.
          artifacts: build/app/outputs/flutter-apk/app-debug.apk
          artifactContentType: application/vnd.android.package-archive
          allowUpdates: true
          makeLatest: true

  build-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch')
    concurrency:
      group: web-preview-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Enable web support
        run: flutter create --platforms=web --org com.example --project-name nolla_app .

      - name: Build web (main)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: flutter build web --release --base-href /NollaApp/ --dart-define=BRANCH_NAME=${{ github.ref_name }} --dart-define=TEST_USERNAME=${{ secrets.TEST_USERNAME }} --dart-define=TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}

      - name: Compute branch slug
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: |
          SLUG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-50)
          echo "BRANCH_SLUG=${SLUG}" >> $GITHUB_ENV

      - name: Build web (branch preview)
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: flutter build web --release --base-href /NollaApp/branch-${{ env.BRANCH_SLUG }}/ --dart-define=BRANCH_NAME=${{ github.ref_name }} --dart-define=TEST_USERNAME=${{ secrets.TEST_USERNAME }} --dart-define=TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}

      - name: Deploy to GitHub Pages (main)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: true
          clean-exclude: |
            branch-*/

      - name: Deploy branch preview
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          target-folder: branch-${{ env.BRANCH_SLUG }}
          clean: true

      - name: Write branch preview summary
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: |
          URL="https://${{ github.repository_owner }}.github.io/NollaApp/branch-${{ env.BRANCH_SLUG }}/"
          echo "### Branch Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo ":globe_with_meridians: [${URL}](${URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed from commit \`$(echo '${{ github.sha }}' | cut -c1-7)\`" >> $GITHUB_STEP_SUMMARY

  cleanup-branch-preview:
    name: Clean up branch preview
    runs-on: ubuntu-latest
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Remove branch preview directory from gh-pages
        run: |
          SLUG=$(echo "${{ github.event.ref }}" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-50)
          BRANCH_DIR="branch-${SLUG}"
          git fetch origin gh-pages 2>/dev/null || { echo "gh-pages branch not found, nothing to clean up."; exit 0; }
          git checkout gh-pages
          if [ -d "$BRANCH_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$BRANCH_DIR"
            git commit -m "Remove preview for branch ${{ github.event.ref }}"
            git push origin gh-pages
          else
            echo "No preview directory found for branch ${{ github.event.ref }}, nothing to clean up."
          fi

  build-ios:
    name: Build iOS (simulator)
    runs-on: macos-latest
    if: false  # disabled to save Actions quota; re-enable: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Regenerate Xcode project
        run: |
          rm -f ios/Runner.xcodeproj/project.pbxproj
          flutter create --platforms=ios --org com.example --project-name nolla_app .

      - name: Build iOS simulator
        run: flutter build ios --simulator --debug --dart-define=BRANCH_NAME=${{ github.head_ref || github.ref_name }} --dart-define=TEST_USERNAME=${{ secrets.TEST_USERNAME }} --dart-define=TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}

      - name: Archive iOS simulator build
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "Runner.app not found. Build tree:"; find build -type d | head -30
            exit 1
          fi
          echo "Archiving: $APP"
          mkdir -p output
          cp -r "$APP" output/Runner.app
          cd output && zip -r ../nolla-app-ios-simulator.zip Runner.app

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: nolla-app-ios-simulator
          path: nolla-app-ios-simulator.zip
          retention-days: 7

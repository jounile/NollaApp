name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nolla-app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Enable web support
        run: flutter create --platforms=web --org com.example --project-name nolla_app .

      - name: Build web
        run: flutter build web --release --base-href /NollaApp/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          path: build/web

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-ios:
    name: Build iOS (simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Regenerate Xcode project
        run: |
          rm -f ios/Runner.xcodeproj/project.pbxproj
          flutter create --platforms=ios --org com.example --project-name nolla_app .

      - name: Build iOS simulator
        run: flutter build ios --simulator --debug

      - name: Archive iOS simulator build
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "Runner.app not found. Build tree:"; find build -type d | head -30
            exit 1
          fi
          echo "Archiving: $APP"
          mkdir -p output
          cp -r "$APP" output/Runner.app
          cd output && zip -r ../nolla-app-ios-simulator.zip Runner.app

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: nolla-app-ios-simulator
          path: nolla-app-ios-simulator.zip
          retention-days: 7

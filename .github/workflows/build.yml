name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nolla-app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-ios:
    name: Build iOS (simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS simulator
        run: flutter build ios --simulator --debug

      - name: Archive iOS simulator build
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "Runner.app not found. Build tree:"; find build -type d | head -30
            exit 1
          fi
          echo "Archiving: $APP"
          mkdir -p output
          cp -r "$APP" output/Runner.app
          cd output && zip -r ../nolla-app-ios-simulator.zip Runner.app

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: nolla-app-ios-simulator
          path: nolla-app-ios-simulator.zip
          retention-days: 7

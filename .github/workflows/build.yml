name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug --dart-define=BRANCH_NAME=${{ github.head_ref || github.ref_name }}

      - name: Upload APK artifact
        id: upload_apk
        uses: actions/upload-artifact@v4
        with:
          name: nolla-app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Comment APK download link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `### Android APK Build\n\n:android: **[Download debug APK](${runUrl}#artifacts)**\n\nBuilt from commit \`${sha}\` — click the link above and expand **Artifacts** to download \`nolla-app-debug.apk\`.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes('### Android APK Build'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Create GitHub Release with APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_number }}
          name: "NollaApp build #${{ github.run_number }}"
          body: |
            Automated debug build from commit ${{ github.sha }}

            **Download the APK below** under *Assets*.
          artifacts: build/app/outputs/flutter-apk/app-debug.apk
          artifactContentType: application/vnd.android.package-archive
          allowUpdates: true
          makeLatest: true

  build-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Enable web support
        run: flutter create --platforms=web --org com.example --project-name nolla_app .

      - name: Build web (main)
        if: github.event_name != 'pull_request'
        run: flutter build web --release --base-href /NollaApp/ --dart-define=BRANCH_NAME=${{ github.ref_name }}

      - name: Build web (PR preview)
        if: github.event_name == 'pull_request'
        run: flutter build web --release --base-href /NollaApp/pr-${{ github.event.pull_request.number }}/ --dart-define=BRANCH_NAME=${{ github.head_ref }}

      - name: Deploy to GitHub Pages (main)
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          clean: true
          clean-exclude: |
            pr-*/

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          target-folder: pr-${{ github.event.pull_request.number }}
          clean: true

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const url = `https://${{ github.repository_owner }}.github.io/NollaApp/pr-${prNumber}/`;
            const body = `### Web Preview\n\n:globe_with_meridians: [Open preview](${url})\n\nDeployed from commit ${sha}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes('### Web Preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  test-login:
    name: Login Browser Test
    runs-on: ubuntu-latest
    needs: build-web
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install --save-dev @playwright/test
          npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Wait for GitHub Pages deployment
        run: |
          URL="https://jounile.github.io/NollaApp/pr-${{ github.event.pull_request.number }}/"
          echo "Polling: $URL"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Page is live!"
              exit 0
            fi
            sleep 10
          done
          echo "Timed out after 5 minutes waiting for GitHub Pages"
          exit 1

      - name: Run login test
        id: run_test
        run: |
          if npx playwright test login.test.js --config playwright.config.js 2>&1 | tee test-output.txt; then
            echo "result=passed" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
          fi
        working-directory: e2e
        env:
          BASE_URL: https://jounile.github.io/NollaApp/pr-${{ github.event.pull_request.number }}/
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload screenshots and test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-test-results
          path: e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Comment login test result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://jounile.github.io/NollaApp/pr-${prNumber}/`;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let output = '';
            try { output = fs.readFileSync('e2e/test-output.txt', 'utf8'); } catch (_) {}
            const passed = output.includes('1 passed');
            const icon = passed ? '✅' : '❌';
            const status = passed ? 'Passed' : 'Failed';
            const detail = passed
              ? 'Login with test credentials succeeded and navigated to the main screen.'
              : `Login test failed — see [screenshots and logs](${runUrl}).`;

            const body = `### Login Browser Test\n\n${icon} **${status}**\n\n${detail}\n\n[Open preview](${previewUrl})`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes('### Login Browser Test'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Fail if login test failed
        if: steps.run_test.outputs.result == 'failed'
        run: |
          cat e2e/test-output.txt
          exit 1

  cleanup-pr-preview:
    name: Clean up PR preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Remove PR preview directory from gh-pages
        run: |
          PR_DIR="pr-${{ github.event.pull_request.number }}"
          git fetch origin gh-pages 2>/dev/null || { echo "gh-pages branch not found, nothing to clean up."; exit 0; }
          git checkout gh-pages
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_DIR"
            git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}"
            git push origin gh-pages
          else
            echo "No preview directory found for PR #${{ github.event.pull_request.number }}, nothing to clean up."
          fi

  build-ios:
    name: Build iOS (simulator)
    runs-on: macos-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Regenerate Xcode project
        run: |
          rm -f ios/Runner.xcodeproj/project.pbxproj
          flutter create --platforms=ios --org com.example --project-name nolla_app .

      - name: Build iOS simulator
        run: flutter build ios --simulator --debug --dart-define=BRANCH_NAME=${{ github.head_ref || github.ref_name }}

      - name: Archive iOS simulator build
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "Runner.app not found. Build tree:"; find build -type d | head -30
            exit 1
          fi
          echo "Archiving: $APP"
          mkdir -p output
          cp -r "$APP" output/Runner.app
          cd output && zip -r ../nolla-app-ios-simulator.zip Runner.app

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: nolla-app-ios-simulator
          path: nolla-app-ios-simulator.zip
          retention-days: 7
